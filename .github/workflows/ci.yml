name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Build, Check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: CI
        run: npm run ci
